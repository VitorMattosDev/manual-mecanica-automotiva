name: Publicar manual

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar rsvg-convert (converte os SVGs técnicos em PDF vetorial)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Instalar Chrome headless (necessário para renderizar mermaid no PDF)
        run: quarto install chrome-headless-shell

      - name: Setup TinyTeX (para o PDF)
        run: quarto install tinytex

      - name: Render
        run: quarto render

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

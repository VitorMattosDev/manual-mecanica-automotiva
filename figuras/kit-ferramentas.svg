<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Um kit básico para começar na garagem</text>

  <!-- Chave de boca/combinada -->
  <g transform="translate(40,70)">
    <path d="M 10 0 a 12 12 0 1 0 0 6 l 6 0 0 60 8 0 0 -60 6 0 a 12 12 0 1 0 0 -6 z" fill="#85929e" stroke="#566573" stroke-width="1.5"/>
    <text x="15" y="95" text-anchor="middle" font-size="11" fill="#2c3e50">Chave</text>
    <text x="15" y="109" text-anchor="middle" font-size="11" fill="#2c3e50">combinada</text>
  </g>

  <!-- Soquete + catraca -->
  <g transform="translate(150,70)">
    <rect x="0" y="0" width="20" height="50" rx="3" fill="#5d6d7e" stroke="#34495e" stroke-width="1.5"/>
    <rect x="4" y="50" width="12" height="16" fill="#34495e"/>
    <rect x="-8" y="60" width="60" height="12" rx="6" fill="#c0392b"/>
    <text x="22" y="95" text-anchor="middle" font-size="11" fill="#2c3e50">Catraca e</text>
    <text x="22" y="109" text-anchor="middle" font-size="11" fill="#2c3e50">soquetes</text>
  </g>

  <!-- Chave de fenda + Phillips -->
  <g transform="translate(270,68)">
    <rect x="6" y="0" width="14" height="34" rx="4" fill="#e67e22"/>
    <rect x="10" y="34" width="6" height="34" fill="#85929e"/>
    <rect x="13" y="68" width="2" height="6" fill="#34495e"/>
    <text x="13" y="95" text-anchor="middle" font-size="11" fill="#2c3e50">Chaves de</text>
    <text x="13" y="109" text-anchor="middle" font-size="11" fill="#2c3e50">fenda/Phillips</text>
  </g>

  <!-- Alicate -->
  <g transform="translate(380,66)">
    <path d="M 8 0 l 6 30 -6 40 6 0 6 -38 z" fill="#2980b9"/>
    <path d="M 28 0 l -6 30 6 40 -6 0 -6 -38 z" fill="#5499c7"/>
    <text x="14" y="95" text-anchor="middle" font-size="11" fill="#2c3e50">Alicate</text>
  </g>

  <!-- Macaco -->
  <g transform="translate(470,80)">
    <rect x="0" y="20" width="60" height="14" rx="3" fill="#c0392b"/>
    <path d="M 5 34 L 30 8 L 55 34 Z" fill="none" stroke="#c0392b" stroke-width="3"/>
    <rect x="26" y="0" width="8" height="12" fill="#c0392b"/>
    <text x="30" y="95" text-anchor="middle" font-size="11" fill="#2c3e50">Macaco</text>
  </g>

  <!-- Cavalete -->
  <g transform="translate(580,72)">
    <path d="M 30 0 L 12 60 M 30 0 L 48 60 M 18 40 H 42" stroke="#566573" stroke-width="4" fill="none"/>
    <text x="30" y="95" text-anchor="middle" font-size="11" fill="#2c3e50">Cavaletes</text>
  </g>

  <!-- Linha 2: EPIs e medição -->
  <text x="350" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#7f8c8d">Proteção e medição</text>

  <!-- Luvas -->
  <g transform="translate(80,200)">
    <path d="M 10 60 l 0 -35 q 0 -8 6 -8 q 6 0 6 8 l 0 -6 q 0 -8 6 -8 q 6 0 6 8 l 0 4 q 0 -6 6 -6 q 6 0 6 8 l 0 35 z" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
    <text x="28" y="80" text-anchor="middle" font-size="11" fill="#2c3e50">Luvas</text>
  </g>

  <!-- Óculos -->
  <g transform="translate(180,210)">
    <circle cx="14" cy="30" r="13" fill="#d6eaf8" stroke="#2980b9" stroke-width="2.5"/>
    <circle cx="48" cy="30" r="13" fill="#d6eaf8" stroke="#2980b9" stroke-width="2.5"/>
    <line x1="27" y1="30" x2="35" y2="30" stroke="#2980b9" stroke-width="2.5"/>
    <text x="31" y="70" text-anchor="middle" font-size="11" fill="#2c3e50">Óculos de proteção</text>
  </g>

  <!-- Lanterna -->
  <g transform="translate(320,205)">
    <rect x="0" y="24" width="44" height="14" rx="4" fill="#34495e"/>
    <path d="M 44 20 l 16 -6 0 34 -16 -6 z" fill="#f39c12"/>
    <text x="28" y="70" text-anchor="middle" font-size="11" fill="#2c3e50">Lanterna</text>
  </g>

  <!-- Calibrador de pneus -->
  <g transform="translate(440,205)">
    <circle cx="22" cy="22" r="18" fill="#fff" stroke="#566573" stroke-width="2.5"/>
    <line x1="22" y1="22" x2="22" y2="9" stroke="#c0392b" stroke-width="2"/>
    <line x1="22" y1="40" x2="22" y2="52" stroke="#566573" stroke-width="6"/>
    <text x="22" y="72" text-anchor="middle" font-size="11" fill="#2c3e50">Calibrador</text>
  </g>

  <!-- Torquímetro -->
  <g transform="translate(550,222)">
    <rect x="0" y="14" width="90" height="12" rx="6" fill="#5d6d7e" stroke="#34495e" stroke-width="1.5"/>
    <rect x="0" y="12" width="22" height="16" rx="3" fill="#c0392b"/>
    <text x="45" y="56" text-anchor="middle" font-size="11" fill="#2c3e50">Torquímetro</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <defs>
    <marker id="ach" markerUnits="userSpaceOnUse" markerWidth="15" markerHeight="15" refX="6" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#c0392b"/>
    </marker>
    <marker id="acc" markerUnits="userSpaceOnUse" markerWidth="15" markerHeight="15" refX="6" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#2980b9"/>
    </marker>
  </defs>

  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">O ar-condicionado "joga" o calor de dentro para fora</text>

  <!-- divisão dentro/fora -->
  <line x1="350" y1="55" x2="350" y2="340" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="180" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">FORA do carro (libera calor)</text>
  <text x="525" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#2980b9">DENTRO do carro (esfria)</text>

  <!-- Condensador (fora, quente) -->
  <rect x="60" y="100" width="120" height="80" rx="6" fill="#f5b7b1" stroke="#c0392b" stroke-width="2.5"/>
  <g stroke="#c0392b" stroke-width="1"><line x1="60" y1="120" x2="180" y2="120"/><line x1="60" y1="140" x2="180" y2="140"/><line x1="60" y1="160" x2="180" y2="160"/></g>
  <text x="120" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">Condensador</text>
  <text x="120" y="216" text-anchor="middle" font-size="10" fill="#7f8c8d">solta calor p/ o ar</text>

  <!-- Compressor (fora, embaixo) -->
  <circle cx="120" cy="290" r="34" fill="#d5dbdb" stroke="#566573" stroke-width="2.5"/>
  <circle cx="120" cy="290" r="10" fill="#566573"/>
  <text x="120" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">Compressor</text>
  <text x="120" y="356" text-anchor="middle" font-size="10" fill="#7f8c8d">movido pela correia</text>

  <!-- Evaporador (dentro, frio) -->
  <rect x="520" y="100" width="120" height="80" rx="6" fill="#d6eaf8" stroke="#2980b9" stroke-width="2.5"/>
  <g stroke="#2980b9" stroke-width="1"><line x1="520" y1="120" x2="640" y2="120"/><line x1="520" y1="140" x2="640" y2="140"/><line x1="520" y1="160" x2="640" y2="160"/></g>
  <text x="580" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">Evaporador</text>
  <text x="580" y="216" text-anchor="middle" font-size="10" fill="#7f8c8d">rouba calor do ar</text>

  <!-- Válvula de expansão -->
  <polygon points="580,250 600,275 560,275" fill="#f39c12" stroke="#ba6018" stroke-width="1.5"/>
  <text x="580" y="295" text-anchor="middle" font-size="10" fill="#ba6018">válvula de expansão</text>

  <!-- Circuito do gás: setas -->
  <!-- compressor -> condensador (quente) -->
  <path d="M 120 256 V 185" fill="none" stroke="#c0392b" stroke-width="4" marker-end="url(#ach)"/>
  <!-- condensador -> válvula (cruza p/ dentro) -->
  <path d="M 180 140 H 420 V 262 H 600 L 585 258" fill="none" stroke="#9b59b6" stroke-width="3"/>
  <path d="M 590 262 L 582 258" fill="none" stroke="#9b59b6" stroke-width="3" marker-end="url(#acp)"/>
  <!-- válvula -> evaporador -->
  <path d="M 580 250 V 185" fill="none" stroke="#2980b9" stroke-width="4" marker-end="url(#acc)"/>
  <!-- evaporador -> compressor (volta) -->
  <path d="M 520 150 H 280 V 290 H 158" fill="none" stroke="#2980b9" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#acc)"/>

  <!-- Filtro de cabine -->
  <rect x="470" y="300" width="70" height="30" rx="4" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
  <text x="505" y="320" text-anchor="middle" font-size="10" fill="#2c3e50">filtro de cabine</text>
  <path d="M 560 315 H 545" stroke="#e67e22" stroke-width="3" marker-end="url(#acf)"/>
  <text x="620" y="319" text-anchor="middle" font-size="10" fill="#e67e22">limpa o ar que entra</text>

  <defs>
    <marker id="acp" markerUnits="userSpaceOnUse" markerWidth="15" markerHeight="15" refX="6" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#9b59b6"/></marker>
    <marker id="acf" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="6" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 Z" fill="#e67e22"/></marker>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Chupeta: a ordem certa de ligar os cabos</text>

  <!-- Bateria fraca -->
  <rect x="50" y="120" width="150" height="100" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="2.5"/>
  <text x="125" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#2c3e50">Bateria fraca</text>
  <text x="125" y="176" text-anchor="middle" font-size="10" fill="#7f8c8d">(carro parado)</text>
  <!-- terminais -->
  <rect x="70" y="108" width="16" height="14" fill="#c0392b"/><text x="78" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#c0392b">+</text>
  <rect x="164" y="108" width="16" height="14" fill="#34495e"/><text x="172" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#34495e">−</text>

  <!-- Bateria boa -->
  <rect x="500" y="120" width="150" height="100" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="575" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#2c3e50">Bateria boa</text>
  <text x="575" y="176" text-anchor="middle" font-size="10" fill="#7f8c8d">(carro auxiliar)</text>
  <rect x="520" y="108" width="16" height="14" fill="#c0392b"/><text x="528" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#c0392b">+</text>
  <rect x="614" y="108" width="16" height="14" fill="#34495e"/><text x="622" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#34495e">−</text>

  <!-- Ponto de massa (metal sem pintura) do carro parado -->
  <rect x="60" y="300" width="130" height="40" rx="5" fill="#d5dbdb" stroke="#566573" stroke-width="2"/>
  <text x="125" y="318" text-anchor="middle" font-size="10" fill="#2c3e50">metal sem pintura</text>
  <text x="125" y="332" text-anchor="middle" font-size="10" fill="#2c3e50">(massa do carro parado)</text>

  <!-- Cabo VERMELHO: dead+ (1) -> good+ (2) -->
  <path d="M 78 100 C 78 60, 528 60, 528 100" fill="none" stroke="#c0392b" stroke-width="5"/>
  <circle cx="90" cy="78" r="12" fill="#c0392b"/><text x="90" y="83" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <circle cx="516" cy="78" r="12" fill="#c0392b"/><text x="516" y="83" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>

  <!-- Cabo PRETO: good- (3) -> massa do carro parado (4) -->
  <path d="M 622 100 C 622 50, 360 360, 190 320" fill="none" stroke="#2c3e50" stroke-width="5"/>
  <circle cx="610" cy="78" r="12" fill="#2c3e50"/><text x="610" y="83" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <circle cx="205" cy="312" r="12" fill="#2c3e50"/><text x="205" y="317" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>

  <!-- aviso central -->
  <rect x="250" y="150" width="200" height="120" rx="8" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="350" y="174" text-anchor="middle" font-size="12" font-weight="700" fill="#ba6018">Ordem para LIGAR</text>
  <text x="350" y="196" text-anchor="middle" font-size="11" fill="#2c3e50">1 → vermelho na fraca (+)</text>
  <text x="350" y="214" text-anchor="middle" font-size="11" fill="#2c3e50">2 → vermelho na boa (+)</text>
  <text x="350" y="232" text-anchor="middle" font-size="11" fill="#2c3e50">3 → preto na boa (−)</text>
  <text x="350" y="250" text-anchor="middle" font-size="11" fill="#2c3e50">4 → preto na massa (metal)</text>
  <text x="350" y="266" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700">para DESLIGAR, inverta: 4-3-2-1</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">A cor da luz indica a urgência</text>

  <!-- ===== Coluna VERMELHA ===== -->
  <g transform="translate(20,50)">
    <rect x="0" y="0" width="210" height="420" rx="10" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
    <rect x="20" y="16" width="170" height="30" rx="15" fill="#c0392b"/>
    <text x="105" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">VERMELHO — PARE</text>

    <!-- Temperatura -->
    <g transform="translate(40,70)" stroke="#c0392b" fill="none" stroke-width="3">
      <rect x="14" y="2" width="8" height="26" rx="4"/>
      <circle cx="18" cy="32" r="8" fill="#c0392b"/>
      <path d="M -2 40 q 6 -6 12 0 t 12 0 t 12 0" stroke-width="2.5"/>
    </g>
    <text x="105" y="128" text-anchor="middle" font-size="12" fill="#2c3e50">Temperatura alta</text>

    <!-- Pressão do óleo -->
    <g transform="translate(45,140)" stroke="#c0392b" fill="none" stroke-width="3">
      <path d="M 0 18 q 18 -14 40 -6 l 10 -2 0 8 -8 2 q 6 10 -6 14 l -28 0 q -14 -8 -8 -16 z" fill="#fdedec"/>
      <path d="M 6 30 l -7 10 q -3 6 4 6 q 7 0 4 -6 z" fill="#c0392b" stroke="none"/>
    </g>
    <text x="105" y="204" text-anchor="middle" font-size="12" fill="#2c3e50">Pressão do óleo</text>

    <!-- Bateria/carga -->
    <g transform="translate(60,215)">
      <rect x="0" y="10" width="60" height="34" rx="4" fill="none" stroke="#c0392b" stroke-width="3"/>
      <rect x="10" y="2" width="12" height="10" fill="#c0392b"/>
      <rect x="38" y="2" width="12" height="10" fill="#c0392b"/>
      <text x="16" y="36" font-size="18" font-weight="700" fill="#c0392b">+</text>
      <text x="40" y="36" font-size="20" font-weight="700" fill="#c0392b">−</text>
    </g>
    <text x="105" y="278" text-anchor="middle" font-size="12" fill="#2c3e50">Carga da bateria</text>

    <!-- Freio -->
    <g transform="translate(70,300)">
      <circle cx="35" cy="30" r="22" fill="none" stroke="#c0392b" stroke-width="3"/>
      <text x="35" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#c0392b">!</text>
      <path d="M 4 18 a 26 26 0 0 0 0 24" fill="none" stroke="#c0392b" stroke-width="3"/>
      <path d="M 66 18 a 26 26 0 0 1 0 24" fill="none" stroke="#c0392b" stroke-width="3"/>
    </g>
    <text x="105" y="372" text-anchor="middle" font-size="12" fill="#2c3e50">Freio</text>
    <text x="105" y="400" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="700">pare assim que puder</text>
  </g>

  <!-- ===== Coluna AMARELA ===== -->
  <g transform="translate(255,50)">
    <rect x="0" y="0" width="210" height="420" rx="10" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
    <rect x="20" y="16" width="170" height="30" rx="15" fill="#e67e22"/>
    <text x="105" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">AMARELO — ATENÇÃO</text>

    <!-- Check engine (motor) -->
    <g transform="translate(55,68)" fill="#e67e22">
      <path d="M 10 14 h 18 l 6 -8 h 10 v 8 h 14 v 10 h 8 v 20 h -10 v 8 h -46 v -10 h -10 z"/>
    </g>
    <text x="105" y="130" text-anchor="middle" font-size="12" fill="#2c3e50">Injeção (check engine)</text>

    <!-- ABS -->
    <g transform="translate(70,140)">
      <circle cx="35" cy="30" r="22" fill="none" stroke="#e67e22" stroke-width="3"/>
      <text x="35" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#e67e22">ABS</text>
      <path d="M 4 18 a 26 26 0 0 0 0 24" fill="none" stroke="#e67e22" stroke-width="3"/>
      <path d="M 66 18 a 26 26 0 0 1 0 24" fill="none" stroke="#e67e22" stroke-width="3"/>
    </g>
    <text x="105" y="204" text-anchor="middle" font-size="12" fill="#2c3e50">Freio ABS</text>

    <!-- Pneu (TPMS) -->
    <g transform="translate(75,212)" fill="#e67e22">
      <path d="M 0 44 q 0 -34 30 -34 q 30 0 30 34 z" fill="none" stroke="#e67e22" stroke-width="3"/>
      <text x="30" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#e67e22">!</text>
      <line x1="0" y1="44" x2="60" y2="44" stroke="#e67e22" stroke-width="3"/>
    </g>
    <text x="105" y="278" text-anchor="middle" font-size="12" fill="#2c3e50">Pressão dos pneus</text>

    <!-- Combustível baixo -->
    <g transform="translate(78,300)" fill="#e67e22">
      <rect x="6" y="6" width="34" height="44" rx="4" fill="none" stroke="#e67e22" stroke-width="3"/>
      <line x1="6" y1="20" x2="40" y2="20" stroke="#e67e22" stroke-width="2"/>
      <path d="M 40 16 l 8 0 0 18 q 0 6 -6 6" fill="none" stroke="#e67e22" stroke-width="2.5"/>
    </g>
    <text x="105" y="372" text-anchor="middle" font-size="12" fill="#2c3e50">Combustível baixo</text>
    <text x="105" y="400" text-anchor="middle" font-size="11" fill="#ba6018" font-weight="700">verifique em breve</text>
  </g>

  <!-- ===== Coluna VERDE/AZUL ===== -->
  <g transform="translate(490,50)">
    <rect x="0" y="0" width="210" height="420" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
    <rect x="20" y="16" width="170" height="30" rx="15" fill="#27ae60"/>
    <text x="105" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">VERDE/AZUL — INFORMA</text>

    <!-- Seta (pisca) -->
    <g transform="translate(70,72)" fill="#27ae60">
      <path d="M 30 6 l 26 22 -16 0 0 18 -20 0 0 -18 -16 0 z"/>
    </g>
    <text x="105" y="130" text-anchor="middle" font-size="12" fill="#2c3e50">Seta / pisca</text>

    <!-- Farol baixo (verde) -->
    <g transform="translate(70,142)" stroke="#27ae60" fill="none" stroke-width="3">
      <path d="M 20 10 q 24 0 24 20 q 0 20 -24 20 z" fill="#27ae60" stroke="none"/>
      <line x1="50" y1="16" x2="68" y2="14"/>
      <line x1="50" y1="26" x2="68" y2="24"/>
      <line x1="50" y1="36" x2="68" y2="34"/>
    </g>
    <text x="105" y="204" text-anchor="middle" font-size="12" fill="#2c3e50">Farol baixo</text>

    <!-- Farol alto (azul) -->
    <g transform="translate(70,212)" stroke="#2980b9" fill="none" stroke-width="3">
      <path d="M 20 10 q 24 0 24 20 q 0 20 -24 20 z" fill="#2980b9" stroke="none"/>
      <line x1="50" y1="14" x2="70" y2="14"/>
      <line x1="50" y1="24" x2="70" y2="24"/>
      <line x1="50" y1="34" x2="70" y2="34"/>
    </g>
    <text x="105" y="278" text-anchor="middle" font-size="12" fill="#2980b9" font-weight="700">Farol alto (azul)</text>

    <text x="105" y="330" text-anchor="middle" font-size="12" fill="#2c3e50">Estas apenas</text>
    <text x="105" y="350" text-anchor="middle" font-size="12" fill="#2c3e50">avisam que algo</text>
    <text x="105" y="370" text-anchor="middle" font-size="12" fill="#2c3e50">está ligado.</text>
    <text x="105" y="400" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="700">sem urgência</text>
  </g>
</svg>

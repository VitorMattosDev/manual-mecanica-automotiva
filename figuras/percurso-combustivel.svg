<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <defs>
    <marker id="fuel" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="7" refY="6" orient="auto">
      <path d="M0,0 L14,6 L0,12 Z" fill="#c0392b"/>
    </marker>
    <marker id="air" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="7" refY="6" orient="auto">
      <path d="M0,0 L14,6 L0,12 Z" fill="#2980b9"/>
    </marker>
  </defs>

  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Combustível (vermelho) e ar (azul) se encontram no motor</text>

  <!-- Tanque -->
  <rect x="30" y="220" width="140" height="90" rx="10" fill="#f5b7b1" stroke="#c0392b" stroke-width="2.5"/>
  <text x="100" y="260" text-anchor="middle" font-size="15" font-weight="700" fill="#2c3e50">Tanque</text>
  <!-- bomba dentro do tanque -->
  <circle cx="100" cy="285" r="13" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <text x="100" y="289" text-anchor="middle" font-size="10" fill="#c0392b">bomba</text>

  <!-- Filtro de combustível -->
  <rect x="250" y="245" width="60" height="40" rx="6" fill="#fdebd0" stroke="#ba6018" stroke-width="2"/>
  <text x="280" y="305" text-anchor="middle" font-size="12" fill="#2c3e50">filtro de</text>
  <text x="280" y="320" text-anchor="middle" font-size="12" fill="#2c3e50">combustível</text>

  <!-- linha de combustível: tanque -> filtro -> sobe até injetores -->
  <path d="M 170 265 H 250" fill="none" stroke="#c0392b" stroke-width="5" marker-end="url(#fuel)"/>
  <path d="M 310 265 H 380 V 150" fill="none" stroke="#c0392b" stroke-width="5"/>

  <!-- Galeria + injetores -->
  <rect x="400" y="135" width="180" height="16" rx="4" fill="#c0392b"/>
  <text x="490" y="128" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="700">galeria + injetores</text>
  <path d="M 380 150 H 400" fill="none" stroke="#c0392b" stroke-width="5"/>
  <!-- bicos injetores -->
  <path d="M 430 151 V 175" fill="none" stroke="#c0392b" stroke-width="4" marker-end="url(#fuel)"/>
  <path d="M 490 151 V 175" fill="none" stroke="#c0392b" stroke-width="4" marker-end="url(#fuel)"/>
  <path d="M 550 151 V 175" fill="none" stroke="#c0392b" stroke-width="4" marker-end="url(#fuel)"/>

  <!-- Motor / coletor de admissão -->
  <rect x="400" y="190" width="180" height="100" rx="10" fill="#d5dbdb" stroke="#566573" stroke-width="2.5"/>
  <text x="490" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#2c3e50">Motor</text>
  <text x="490" y="268" text-anchor="middle" font-size="11" fill="#7f8c8d">ar + combustível queimam aqui</text>

  <!-- Filtro de ar -> admissão -->
  <rect x="610" y="60" width="80" height="45" rx="6" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>
  <text x="650" y="80" text-anchor="middle" font-size="12" fill="#2c3e50">filtro</text>
  <text x="650" y="96" text-anchor="middle" font-size="12" fill="#2c3e50">de ar</text>
  <path d="M 650 105 V 165 H 585" fill="none" stroke="#2980b9" stroke-width="5" marker-end="url(#air)"/>
  <text x="600" y="130" text-anchor="middle" font-size="12" fill="#2980b9" font-weight="700">ar ←</text>
</svg>

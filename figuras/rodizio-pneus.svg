<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <defs>
    <marker id="rd" markerUnits="userSpaceOnUse" markerWidth="15" markerHeight="15" refX="6" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#c0392b"/>
    </marker>
  </defs>
  <text x="310" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Rodízio: trocar os pneus de posição para gastar por igual</text>

  <!-- contorno do carro (vista de cima) -->
  <rect x="200" y="60" width="220" height="280" rx="40" fill="#eaf2f8" stroke="#5499c7" stroke-width="2"/>
  <text x="310" y="95" text-anchor="middle" font-size="13" fill="#7f8c8d">frente ↑</text>
  <text x="310" y="328" text-anchor="middle" font-size="11" fill="#bdc3c7">(vista de cima)</text>

  <!-- 4 pneus -->
  <g fill="#34495e">
    <rect x="150" y="80" width="36" height="70" rx="6"/>   <!-- DE diant esq -->
    <rect x="434" y="80" width="36" height="70" rx="6"/>   <!-- DD diant dir -->
    <rect x="150" y="250" width="36" height="70" rx="6"/>  <!-- TE tras esq -->
    <rect x="434" y="250" width="36" height="70" rx="6"/>  <!-- TD tras dir -->
  </g>
  <g font-size="11" fill="#fff" text-anchor="middle" font-weight="700">
    <text x="168" y="120">DE</text><text x="452" y="120">DD</text>
    <text x="168" y="290">TE</text><text x="452" y="290">TD</text>
  </g>

  <!-- setas de rodízio (tração dianteira): frente reto p/ trás; trás cruzado p/ frente -->
  <!-- dianteiros vão retos para trás -->
  <path d="M 130 115 H 95 V 285 H 145" fill="none" stroke="#c0392b" stroke-width="3" marker-end="url(#rd)"/>
  <path d="M 490 115 H 525 V 285 H 475" fill="none" stroke="#c0392b" stroke-width="3" marker-end="url(#rd)"/>
  <!-- traseiros cruzam para a frente (X no centro) -->
  <path d="M 168 248 L 452 152" fill="none" stroke="#27ae60" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#rdg)"/>
  <path d="M 452 248 L 168 152" fill="none" stroke="#27ae60" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#rdg)"/>

  <!-- legenda -->
  <rect x="40" y="50" width="14" height="14" fill="#c0392b"/>
  <text x="60" y="62" font-size="11" fill="#2c3e50">dianteiros → trás (reto)</text>
  <rect x="40" y="72" width="14" height="4" fill="#27ae60"/>
  <text x="60" y="80" font-size="11" fill="#2c3e50">traseiros → frente (cruzado)</text>
  <text x="310" y="372" text-anchor="middle" font-size="11" fill="#7f8c8d">padrão para tração dianteira — consulte o manual do seu carro</text>

  <defs>
    <marker id="rdg" markerUnits="userSpaceOnUse" markerWidth="15" markerHeight="15" refX="6" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#27ae60"/>
    </marker>
  </defs>
</svg>

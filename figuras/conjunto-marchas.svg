<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Trocar de marcha é trocar a relação entre as engrenagens</text>

  <!-- Painel 1: marcha reduzida (força) -->
  <g transform="translate(40,55)">
    <rect x="0" y="0" width="260" height="250" rx="8" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
    <text x="130" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#ba6018">1ª marcha — muita FORÇA</text>
    <text x="130" y="48" text-anchor="middle" font-size="11" fill="#ba6018">engrenagem do motor é pequena</text>

    <!-- engrenagem grande (rodas) -->
    <circle cx="165" cy="160" r="62" fill="none" stroke="#566573" stroke-width="9" stroke-dasharray="10 9"/>
    <circle cx="165" cy="160" r="56" fill="#d5dbdb" stroke="#566573" stroke-width="2"/>
    <circle cx="165" cy="160" r="8" fill="#34495e"/>
    <text x="165" y="164" text-anchor="middle" font-size="11" fill="#7f8c8d">rodas</text>

    <!-- engrenagem pequena (motor) - encosta na grande -->
    <circle cx="73" cy="160" r="30" fill="none" stroke="#566573" stroke-width="8" stroke-dasharray="8 7"/>
    <circle cx="73" cy="160" r="25" fill="#aeb6bf" stroke="#566573" stroke-width="2"/>
    <circle cx="73" cy="160" r="6" fill="#34495e"/>
    <text x="73" y="164" text-anchor="middle" font-size="10" fill="#2c3e50">motor</text>

    <text x="130" y="240" text-anchor="middle" font-size="11" fill="#ba6018" font-style="italic">gira devagar, mas empurra forte</text>
  </g>

  <!-- Painel 2: marcha alta (velocidade) -->
  <g transform="translate(380,55)">
    <rect x="0" y="0" width="260" height="250" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
    <text x="130" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#1e8449">5ª marcha — muita VELOCIDADE</text>
    <text x="130" y="48" text-anchor="middle" font-size="11" fill="#1e8449">engrenagem do motor é grande</text>

    <!-- engrenagem grande (motor) -->
    <circle cx="95" cy="160" r="62" fill="none" stroke="#566573" stroke-width="9" stroke-dasharray="10 9"/>
    <circle cx="95" cy="160" r="56" fill="#aeb6bf" stroke="#566573" stroke-width="2"/>
    <circle cx="95" cy="160" r="8" fill="#34495e"/>
    <text x="95" y="164" text-anchor="middle" font-size="11" fill="#2c3e50">motor</text>

    <!-- engrenagem pequena (rodas) -->
    <circle cx="187" cy="160" r="30" fill="none" stroke="#566573" stroke-width="8" stroke-dasharray="8 7"/>
    <circle cx="187" cy="160" r="25" fill="#d5dbdb" stroke="#566573" stroke-width="2"/>
    <circle cx="187" cy="160" r="6" fill="#34495e"/>
    <text x="187" y="164" text-anchor="middle" font-size="10" fill="#7f8c8d">rodas</text>

    <text x="130" y="240" text-anchor="middle" font-size="11" fill="#1e8449" font-style="italic">gira rápido, mas empurra fraco</text>
  </g>
</svg>

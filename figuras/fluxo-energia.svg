<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <defs>
    <linearGradient id="cx" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5b7b1"/>
      <stop offset="100%" stop-color="#e6a09a"/>
    </linearGradient>
    <marker id="flow" markerWidth="12" markerHeight="12" refX="6" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Caixas das etapas -->
  <g text-anchor="middle">
    <!-- Tanque -->
    <rect x="20" y="70" width="120" height="90" rx="8" fill="#d6eaf8" stroke="#5499c7" stroke-width="2.5"/>
    <text x="80" y="105" font-size="16" font-weight="700" fill="#2c3e50">Tanque</text>
    <text x="80" y="128" font-size="12" fill="#5d6d7e">energia</text>
    <text x="80" y="144" font-size="12" fill="#5d6d7e">química</text>

    <!-- Motor -->
    <rect x="200" y="70" width="120" height="90" rx="8" fill="url(#cx)" stroke="#c0392b" stroke-width="2.5"/>
    <text x="260" y="105" font-size="16" font-weight="700" fill="#2c3e50">Motor</text>
    <text x="260" y="128" font-size="12" fill="#5d6d7e">energia de</text>
    <text x="260" y="144" font-size="12" fill="#5d6d7e">movimento</text>

    <!-- Transmissão -->
    <rect x="380" y="70" width="120" height="90" rx="8" fill="#d5dbdb" stroke="#566573" stroke-width="2.5"/>
    <text x="440" y="105" font-size="16" font-weight="700" fill="#2c3e50">Transmissão</text>
    <text x="440" y="128" font-size="12" fill="#5d6d7e">ajusta força</text>
    <text x="440" y="144" font-size="12" fill="#5d6d7e">e velocidade</text>

    <!-- Rodas -->
    <rect x="560" y="70" width="120" height="90" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2.5"/>
    <text x="620" y="105" font-size="16" font-weight="700" fill="#2c3e50">Rodas</text>
    <text x="620" y="128" font-size="12" fill="#5d6d7e">o carro</text>
    <text x="620" y="144" font-size="12" fill="#5d6d7e">anda</text>
  </g>

  <!-- Setas de fluxo -->
  <g stroke="#c0392b" stroke-width="3" fill="none">
    <line x1="142" y1="115" x2="196" y2="115" marker-end="url(#flow)"/>
    <line x1="322" y1="115" x2="376" y2="115" marker-end="url(#flow)"/>
    <line x1="502" y1="115" x2="556" y2="115" marker-end="url(#flow)"/>
  </g>

  <!-- Rótulo da transformação -->
  <text x="260" y="55" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="700">explosão controlada</text>
  <line x1="260" y1="60" x2="260" y2="68" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Título e perda de calor -->
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#2c3e50">A energia atravessa o carro da esquerda para a direita</text>

  <!-- Perda de calor: parte da energia do motor não vira movimento -->
  <path d="M 260 200 C 360 218, 540 218, 640 208" stroke="#e67e22" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#heat)"/>
  <text x="430" y="240" text-anchor="middle" font-size="11" fill="#e67e22" font-style="italic">boa parte da energia do motor vira calor — daí a necessidade do arrefecimento</text>

  <defs>
    <marker id="heat" markerWidth="12" markerHeight="12" refX="6" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 Z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>

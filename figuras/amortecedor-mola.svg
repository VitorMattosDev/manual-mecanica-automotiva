<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" font-family="'Source Sans Pro', sans-serif" class="figura-tecnica">
  <defs>
    <marker id="bump" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="6" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#e67e22"/>
    </marker>
  </defs>

  <text x="280" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Mola e amortecedor: trabalham juntos contra os buracos</text>

  <!-- ===== A mola sozinha (ricocheteia) ===== -->
  <g transform="translate(70,70)">
    <text x="80" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#2c3e50">Só a mola</text>
    <!-- mola -->
    <path d="M 50 30 L 110 45 L 50 60 L 110 75 L 50 90 L 110 105 L 50 120 L 110 135 L 50 150 L 110 165 L 80 175"
          fill="none" stroke="#c0392b" stroke-width="4"/>
    <!-- carro balança -->
    <path d="M 130 60 q 25 30 0 60" fill="none" stroke="#e67e22" stroke-width="2.5" marker-end="url(#bump)"/>
    <path d="M 30 120 q -25 -30 0 -60" fill="none" stroke="#e67e22" stroke-width="2.5" marker-end="url(#bump)"/>
    <text x="80" y="215" text-anchor="middle" font-size="11" fill="#e67e22">absorve, mas fica balançando</text>
  </g>

  <!-- ===== Mola + amortecedor (controlado) ===== -->
  <g transform="translate(320,70)">
    <text x="90" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#2c3e50">Mola + amortecedor</text>
    <!-- mola em volta -->
    <path d="M 40 30 L 90 45 L 40 60 L 90 75 L 40 90 L 90 105 L 40 120 L 90 135 L 40 150 L 90 165 L 65 175"
          fill="none" stroke="#c0392b" stroke-width="4"/>
    <!-- amortecedor (cilindro + haste) no centro -->
    <rect x="58" y="95" width="20" height="80" rx="3" fill="#5d6d7e" stroke="#34495e" stroke-width="2"/>
    <rect x="64" y="40" width="8" height="60" rx="2" fill="#aeb6bf" stroke="#34495e" stroke-width="1.5"/>
    <text x="135" y="115" font-size="11" fill="#34495e">amortecedor</text>
    <text x="135" y="130" font-size="11" fill="#34495e">(óleo dentro)</text>
    <text x="90" y="215" text-anchor="middle" font-size="11" fill="#1e8449">absorve e para de balançar logo</text>
  </g>

  <!-- chão e roda comum embaixo -->
  <g transform="translate(0,300)">
    <line x1="20" y1="0" x2="540" y2="0" stroke="#7f8c8d" stroke-width="3"/>
    <path d="M 250 0 q 30 25 60 0" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
    <text x="280" y="45" text-anchor="middle" font-size="12" fill="#e67e22" font-weight="700">buraco na rua</text>
  </g>
</svg>
